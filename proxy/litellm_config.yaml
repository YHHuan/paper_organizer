model_list:
  # --- Shared aliases (routed through OpenRouter, billed to owner's key) ---
  - model_name: fast
    litellm_params:
      model: openrouter/openai/gpt-4o-mini
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: smart
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4-6
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: gemini-fast
    litellm_params:
      model: openrouter/google/gemini-flash-2.0-exp
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # --- Pass-through for own-key users (openai/*) ---
  - model_name: openai/*
    litellm_params:
      model: openai/{model}
      api_key: os.environ/OPENAI_API_KEY   # user supplies via header or env

  # --- Pass-through for own-key users (anthropic/*) ---
  - model_name: anthropic/*
    litellm_params:
      model: anthropic/{model}
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- Pass-through for own-key users (google/*) ---
  - model_name: google/*
    litellm_params:
      model: google/{model}
      api_key: os.environ/GEMINI_API_KEY

router_settings:
  num_retries: 3
  timeout: 120
  retry_after: 5
  # Fallback: if smart fails, try fast
  content_policy_fallbacks:
    - smart:
        - fast

litellm_settings:
  # Uncomment to enable Langfuse observability:
  # success_callback: ["langfuse"]
  # failure_callback: ["langfuse"]
  drop_params: true          # ignore unsupported params silently
  request_timeout: 120
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false
  ui_access_mode: admin_only

# Virtual keys are created via the API after deploy:
#
# curl -s -X POST https://your-proxy.up.railway.app/key/generate \
#   -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
#   -H "Content-Type: application/json" \
#   -d '{
#         "key_alias": "user_alice",
#         "max_budget": 2.0,
#         "budget_duration": "monthly",
#         "hard_budget_limit": true,
#         "metadata": {"user": "alice", "team": "paper-organizer"}
#       }'
#
# The response contains the virtual key (sk-...) to share with the user.
# Keys are stored in Postgres; rotate or revoke via /key/delete.
