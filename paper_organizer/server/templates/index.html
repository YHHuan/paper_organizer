<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Organizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    button, input, textarea, label { touch-action: manipulation; }

    #result-card { transition: opacity 0.3s ease, transform 0.3s ease; }
    #result-card.entering { opacity: 0; transform: translateY(10px); }

    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
      background-size: 600px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 6px;
    }

    .backend-pill input:checked + span {
      background-color: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }

    @keyframes toast-in  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toast-out { from { opacity:1; transform:translateY(0); }    to { opacity:0; transform:translateY(16px); } }
    #toast { animation: toast-in 0.25s ease forwards; }
    #toast.leaving { animation: toast-out 0.25s ease forwards; }

    #abstract-body { overflow: hidden; transition: max-height 0.3s ease; }

    .acc-body { overflow: hidden; transition: max-height 0.35s ease; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 font-[system-ui,sans-serif] text-gray-900 antialiased">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200">
    <div class="max-w-xl mx-auto px-5 py-5 flex items-center gap-3">
      <div class="shrink-0 w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center shadow-sm">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight text-gray-900 leading-tight">Paper Organizer</h1>
        <p class="text-xs text-gray-400 leading-tight">Drop a paper link, get structured notes.</p>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-xl mx-auto px-4 py-7 space-y-5">

    <!-- Input card -->
    <section class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 space-y-5">
      <div class="space-y-2">
        <label for="input_text" class="block text-sm font-semibold text-gray-700">
          Paper URL, DOI, or PMID
        </label>
        <textarea
          id="input_text" name="input_text" rows="3"
          spellcheck="false" autocorrect="off" autocapitalize="off"
          class="w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-base
                 leading-relaxed placeholder-gray-400
                 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                 focus:bg-white resize-none transition-colors"
          placeholder="https://pubmed.ncbi.nlm.nih.gov/38226862&#10;10.1056/NEJMoa2304146&#10;PMID: 38226862"
        ></textarea>
      </div>

      <div class="space-y-2">
        <p class="text-sm font-semibold text-gray-700">Add to</p>
        <div class="flex gap-2">
          <label class="backend-pill cursor-pointer">
            <input type="radio" name="backend" value="zotero" checked class="sr-only" onchange="updatePills()" />
            <span class="block px-4 py-2 rounded-full border border-gray-200 text-sm font-medium
                         text-gray-600 bg-gray-50 transition-colors select-none">Zotero</span>
          </label>
          <label class="backend-pill cursor-pointer">
            <input type="radio" name="backend" value="endnote" class="sr-only" onchange="updatePills()" />
            <span class="block px-4 py-2 rounded-full border border-gray-200 text-sm font-medium
                         text-gray-600 bg-gray-50 transition-colors select-none">EndNote</span>
          </label>
          <label class="backend-pill cursor-pointer">
            <input type="radio" name="backend" value="both" class="sr-only" onchange="updatePills()" />
            <span class="block px-4 py-2 rounded-full border border-gray-200 text-sm font-medium
                         text-gray-600 bg-gray-50 transition-colors select-none">Both</span>
          </label>
        </div>
      </div>

      <button id="submit-btn" type="button" onclick="submitPaper()"
        class="w-full flex items-center justify-center gap-2.5 rounded-xl bg-blue-600
               px-5 py-3.5 text-base font-semibold text-white
               hover:bg-blue-700 active:bg-blue-800 active:scale-[0.99]
               focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2
               transition-all disabled:opacity-50 disabled:cursor-not-allowed">
        <svg id="btn-spinner" class="hidden animate-spin h-5 w-5 text-white shrink-0"
             xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4l3-3-3-3v4a8 8 0 00-8 8h4z"></path>
        </svg>
        <span id="btn-label">Analyze Paper</span>
      </button>

      <p class="text-center text-xs text-gray-400 -mt-1">
        <kbd class="font-mono bg-gray-100 border border-gray-200 rounded px-1 py-0.5 text-gray-500">⌘ Enter</kbd>
        to submit
      </p>
    </section>

    <!-- Skeleton loader -->
    <section id="skeleton-card"
             class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 p-5 space-y-4">
      <div class="skeleton h-5 w-3/4"></div>
      <div class="skeleton h-4 w-1/2"></div>
      <div class="space-y-2">
        <div class="skeleton h-3 w-full"></div>
        <div class="skeleton h-3 w-5/6"></div>
        <div class="skeleton h-3 w-4/6"></div>
      </div>
      <div class="flex gap-2">
        <div class="skeleton h-6 w-20 rounded-full"></div>
        <div class="skeleton h-6 w-24 rounded-full"></div>
        <div class="skeleton h-6 w-16 rounded-full"></div>
      </div>
    </section>

    <!-- Result card -->
    <section id="result-card"
             class="hidden bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

      <!-- Header block -->
      <div class="p-5 space-y-1.5">
        <h2 id="res-title" class="text-base font-bold text-gray-900 leading-snug"></h2>
        <p id="res-meta" class="text-sm text-gray-500"></p>
        <span id="res-journal-badge"
              class="hidden inline-block mt-1 text-xs font-medium bg-blue-50 text-blue-700
                     border border-blue-100 px-2.5 py-0.5 rounded-full"></span>
      </div>

      <!-- One-liner -->
      <div id="one-liner-box" class="hidden mx-5 mb-4 rounded-xl bg-blue-50 border border-blue-100 px-4 py-3.5">
        <p class="text-xs font-semibold uppercase tracking-wider text-blue-400 mb-1.5">Clinical Takeaway</p>
        <p id="one-liner-text" class="text-sm text-blue-900 leading-relaxed"></p>
      </div>

      <!-- Abstract (collapsible) -->
      <div id="abstract-wrapper" class="hidden mx-5 mb-4 space-y-1">
        <button id="abstract-toggle" onclick="toggleAbstract()"
                class="flex items-center gap-1.5 text-sm font-medium text-gray-500
                       hover:text-blue-600 transition-colors focus:outline-none">
          <svg id="abstract-chevron"
               class="w-4 h-4 text-gray-400 transition-transform duration-200"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
          Abstract
        </button>
        <div id="abstract-body" style="max-height: 0;">
          <p id="res-abstract"
             class="text-sm text-gray-600 leading-relaxed pt-1 pb-1 border-l-2 border-blue-100 pl-3"></p>
        </div>
      </div>

      <!-- Section accordion -->
      <div id="sections-accordion" class="hidden border-t border-gray-100"></div>

      <!-- Footer row: status + PDF + Zotero -->
      <div class="px-5 py-4 border-t border-gray-100 space-y-2.5">

        <!-- Status -->
        <div id="res-status-row" class="flex items-start gap-2 rounded-xl px-3 py-2.5 text-sm">
          <svg id="status-icon-check" class="hidden shrink-0 w-4 h-4 text-green-500 mt-0.5"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
          <svg id="status-icon-warn" class="hidden shrink-0 w-4 h-4 text-amber-500 mt-0.5"
               fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
          </svg>
          <span id="res-status-msg" class="text-gray-600 leading-snug"></span>
        </div>

        <!-- PDF + Zotero row -->
        <div class="flex flex-wrap items-center gap-x-4 gap-y-1.5 text-sm text-gray-500 px-1">
          <span id="res-pdf-row" class="hidden flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 text-gray-400 shrink-0" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
            </svg>
            <span id="res-pdf-msg"></span>
          </span>

          <span id="zotero-badge" class="hidden flex items-center gap-1.5 text-green-700 font-medium">
            <svg class="w-3.5 h-3.5 text-green-500 shrink-0" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            <span id="zotero-badge-text">Saved to Zotero</span>
          </span>
        </div>

      </div>
    </section>

  </main>

  <!-- Footer -->
  <footer class="max-w-xl mx-auto px-5 pb-8 pt-2 text-center text-xs text-gray-400 space-x-1">
    <span>Running locally</span>
    <span class="text-gray-300">&middot;</span>
    <span>Mobile: <code class="font-mono">paper-organizer serve --tunnel</code></span>
    <span class="text-gray-300">&middot;</span>
    <span>v0.1</span>
  </footer>

  <!-- Toast container -->
  <div id="toast-container"
       class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none
              flex flex-col items-center gap-2"></div>

  <script>
    // ── Section definitions ──────────────────────────────────
    const SECTIONS = [
      { key: 'study_design',       label: 'Study Design',       svgPath: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2' },
      { key: 'results',            label: 'Results',            svgPath: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
      { key: 'clinical_relevance', label: 'Clinical Relevance', svgPath: 'M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z' },
      { key: 'strengths',          label: 'Strengths',          svgPath: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' },
      { key: 'limitations',        label: 'Limitations',        svgPath: 'M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z' },
      { key: 'action_items',       label: 'Action Items',       svgPath: 'M13 10V3L4 14h7v7l9-11h-7z' },
    ];

    // ── State ────────────────────────────────────────────────
    let abstractOpen = false;

    // ── Backend pill sync ────────────────────────────────────
    function updatePills() {
      document.querySelectorAll('.backend-pill').forEach(pill => {
        const input = pill.querySelector('input');
        const span  = pill.querySelector('span');
        if (input.checked) {
          span.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
          span.classList.remove('bg-gray-50', 'text-gray-600', 'border-gray-200');
        } else {
          span.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
          span.classList.add('bg-gray-50', 'text-gray-600', 'border-gray-200');
        }
      });
    }
    updatePills();

    // ── Submit ───────────────────────────────────────────────
    async function submitPaper() {
      const inputEl = document.getElementById('input_text');
      const text    = inputEl.value.trim();
      const backend = document.querySelector('input[name="backend"]:checked')?.value ?? 'zotero';

      if (!text) {
        showToast('Please paste a URL, DOI, or PMID first.', 'warn');
        inputEl.focus();
        return;
      }

      setLoading(true);
      document.getElementById('result-card').classList.add('hidden');

      const form = new FormData();
      form.append('input_text', text);
      form.append('backend', backend);

      try {
        const res  = await fetch('/ingest', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok || data.status === 'error') {
          showToast(data.message ?? 'Something went wrong.', 'error');
        } else {
          renderResult(data);
          inputEl.value = '';
        }
      } catch (err) {
        showToast('Network error — is the server running? ' + err.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    // ── Loading ──────────────────────────────────────────────
    function setLoading(on) {
      document.getElementById('submit-btn').disabled = on;
      document.getElementById('btn-label').textContent = on ? 'Analyzing…' : 'Analyze Paper';
      document.getElementById('btn-spinner').classList.toggle('hidden', !on);
      document.getElementById('skeleton-card').classList.toggle('hidden', !on);
    }

    // ── Render result ────────────────────────────────────────
    function renderResult(data) {
      const card = document.getElementById('result-card');

      // Title + meta
      document.getElementById('res-title').textContent = data.title || 'Untitled paper';
      const authors = (data.authors || []).join(', ');
      document.getElementById('res-meta').textContent =
        authors ? authors + (data.year ? ` · ${data.year}` : '') : (data.year || '');

      // Journal badge
      const badge = document.getElementById('res-journal-badge');
      if (data.journal) { badge.textContent = data.journal; badge.classList.remove('hidden'); }
      else badge.classList.add('hidden');

      // One-liner
      const olBox  = document.getElementById('one-liner-box');
      const olText = document.getElementById('one-liner-text');
      const ol = data.sections?.one_liner || '';
      if (ol) { olText.textContent = ol; olBox.classList.remove('hidden'); }
      else olBox.classList.add('hidden');

      // Abstract
      const absWrapper = document.getElementById('abstract-wrapper');
      const absBody    = document.getElementById('abstract-body');
      if (data.abstract) {
        document.getElementById('res-abstract').textContent = data.abstract;
        absWrapper.classList.remove('hidden');
        abstractOpen = false;
        absBody.style.maxHeight = '0';
        document.getElementById('abstract-chevron').style.transform = '';
      } else {
        absWrapper.classList.add('hidden');
      }

      // Section accordion
      renderSections(data.sections || {});

      // Status
      const statusRow = document.getElementById('res-status-row');
      const iconCheck = document.getElementById('status-icon-check');
      const iconWarn  = document.getElementById('status-icon-warn');
      const statusMsg = document.getElementById('res-status-msg');
      statusMsg.textContent = data.message || '';
      if (data.status === 'success') {
        statusRow.className = 'flex items-start gap-2 rounded-xl px-3 py-2.5 text-sm bg-green-50';
        iconCheck.classList.remove('hidden'); iconWarn.classList.add('hidden');
        statusMsg.className = 'text-green-800 leading-snug';
      } else {
        statusRow.className = 'flex items-start gap-2 rounded-xl px-3 py-2.5 text-sm bg-amber-50';
        iconWarn.classList.remove('hidden'); iconCheck.classList.add('hidden');
        statusMsg.className = 'text-amber-800 leading-snug';
      }

      // PDF row
      const pdfRow = document.getElementById('res-pdf-row');
      const pdfMsg = document.getElementById('res-pdf-msg');
      if (data.pdf_available !== undefined) {
        pdfRow.classList.remove('hidden');
        pdfMsg.textContent = data.pdf_available ? 'Open-access PDF' : 'No open-access PDF';
      } else {
        pdfRow.classList.add('hidden');
      }

      // Zotero badge
      const zBadge = document.getElementById('zotero-badge');
      const zText  = document.getElementById('zotero-badge-text');
      if (data.zotero_key) {
        zText.textContent = data.zotero_created ? 'Saved to Zotero' : 'Already in Zotero';
        zBadge.classList.remove('hidden');
      } else {
        zBadge.classList.add('hidden');
      }

      // Animate card in
      card.classList.remove('hidden');
      card.classList.add('entering');
      requestAnimationFrame(() => requestAnimationFrame(() => card.classList.remove('entering')));
      card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Section accordion ────────────────────────────────────
    function renderSections(sections) {
      const accordion = document.getElementById('sections-accordion');
      accordion.innerHTML = '';

      let rendered = 0;
      SECTIONS.forEach((def, i) => {
        const content = sections[def.key] || '';
        if (!content.trim()) return;

        const isFirst = rendered === 0;
        rendered++;

        const item = document.createElement('div');
        item.className = rendered > 1 ? 'border-t border-gray-100' : '';

        item.innerHTML = `
          <button class="w-full flex items-center justify-between gap-3 px-5 py-3.5 text-left
                         hover:bg-gray-50 transition-colors focus:outline-none"
                  onclick="toggleSection('${def.key}')">
            <span class="flex items-center gap-2.5 text-sm font-semibold text-gray-800">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor"
                   stroke-width="1.75" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="${def.svgPath}" />
              </svg>
              ${def.label}
            </span>
            <svg id="chevron-${def.key}"
                 class="w-4 h-4 text-gray-400 shrink-0 transition-transform duration-200${isFirst ? ' rotate-180' : ''}"
                 fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          <div id="acc-${def.key}" class="acc-body"
               style="max-height: ${isFirst ? '2000px' : '0'}">
            <div class="px-5 pb-5 text-sm text-gray-700 leading-relaxed">
              ${mdToHtml(content)}
            </div>
          </div>`;

        accordion.appendChild(item);
      });

      accordion.classList.toggle('hidden', rendered === 0);
    }

    function toggleSection(key) {
      const body    = document.getElementById(`acc-${key}`);
      const chevron = document.getElementById(`chevron-${key}`);
      const isOpen  = parseInt(body.style.maxHeight) > 0;
      if (isOpen) {
        body.style.maxHeight = '0';
        chevron.classList.remove('rotate-180');
      } else {
        body.style.maxHeight = body.scrollHeight + 64 + 'px';
        chevron.classList.add('rotate-180');
      }
    }

    // ── Markdown → HTML (bullets + key:value) ────────────────
    function mdToHtml(text) {
      const lines  = text.trim().split('\n');
      const parts  = [];
      let inList   = false;

      for (const raw of lines) {
        const ln = raw.trim();
        if (!ln) {
          if (inList) { parts.push('</ul>'); inList = false; }
          continue;
        }
        const isBullet = /^[-•*]\s/.test(ln);
        if (isBullet) {
          if (!inList) { parts.push('<ul class="space-y-1.5 list-none">'); inList = true; }
          const body = ln.replace(/^[-•*]\s+/, '');
          // Key: Value pattern (for Study Design fields)
          const m = body.match(/^([^:]{1,40}):\s+(.+)$/);
          if (m) {
            parts.push(`<li><span class="font-medium text-gray-600">${esc(m[1])}:</span> ${esc(m[2])}</li>`);
          } else {
            parts.push(`<li class="before:content-['·'] before:mr-2 before:text-gray-300">${esc(body)}</li>`);
          }
        } else {
          if (inList) { parts.push('</ul>'); inList = false; }
          parts.push(`<p>${esc(ln)}</p>`);
        }
      }
      if (inList) parts.push('</ul>');
      return parts.join('\n');
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Abstract toggle ──────────────────────────────────────
    function toggleAbstract() {
      const body    = document.getElementById('abstract-body');
      const chevron = document.getElementById('abstract-chevron');
      const para    = document.getElementById('res-abstract');
      abstractOpen  = !abstractOpen;
      if (abstractOpen) {
        body.style.maxHeight = para.scrollHeight + 32 + 'px';
        chevron.style.transform = 'rotate(180deg)';
      } else {
        body.style.maxHeight = '0';
        chevron.style.transform = '';
      }
    }

    // ── Toast ────────────────────────────────────────────────
    function showToast(msg, type = 'error') {
      const colors = { error:'bg-red-600 text-white', warn:'bg-amber-500 text-white', info:'bg-gray-800 text-white' };
      const toast  = document.createElement('div');
      toast.id = 'toast';
      toast.className = `pointer-events-auto px-5 py-3 rounded-2xl shadow-lg text-sm font-medium max-w-sm text-center ${colors[type]||colors.info}`;
      toast.textContent = msg;
      document.getElementById('toast-container').appendChild(toast);
      setTimeout(() => {
        toast.classList.add('leaving');
        toast.addEventListener('animationend', () => toast.remove(), { once: true });
      }, 3500);
    }

    // ── Keyboard shortcut ────────────────────────────────────
    document.getElementById('input_text').addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); submitPaper(); }
    });
  </script>
</body>
</html>
